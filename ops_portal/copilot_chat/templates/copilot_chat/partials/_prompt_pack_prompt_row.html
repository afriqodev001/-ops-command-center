<div class="flex items-start gap-2 p-2 rounded-lg bg-surface-3/40 border border-edge" x-data="{ deleted: false }">
  <input type="hidden" name="prompt_id" value="{{ prompt.id|default:'' }}">
  <input type="hidden" name="prompt_order" value="{{ order }}">
  <input type="hidden" name="prompt_delete" :value="deleted ? '1' : '0'">

  <span class="text-[10px] text-ink-muted font-mono mt-2 flex-shrink-0 w-4 text-right">{{ order }}</span>

  <textarea name="prompt_text" rows="3"
            class="input-dark text-xs resize-y flex-1"
            :class="deleted ? 'opacity-30 line-through' : ''"
            :disabled="deleted"
            placeholder="Enter prompt text...">{{ prompt.text|default:'' }}</textarea>

  <button type="button" @click="deleted = !deleted"
          class="p-1 rounded hover:bg-white/10 text-ink-muted hover:text-danger transition-colors flex-shrink-0 mt-1"
          :title="deleted ? 'Undo delete' : 'Delete prompt'">
    <svg x-show="!deleted" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
    </svg>
    <svg x-show="deleted" x-cloak class="w-3.5 h-3.5 text-warn" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/>
    </svg>
  </button>
</div>
