<div class="flex items-start gap-2.5 rounded-lg px-3 py-2.5
  {% if kind == 'error' %}bg-danger/10 border border-danger/20
  {% elif kind == 'success' %}bg-ok/10 border border-ok/20
  {% else %}bg-info/10 border border-info/20{% endif %}">
  {% if kind == 'error' %}
  <svg class="w-4 h-4 text-danger flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
  </svg>
  {% elif kind == 'success' %}
  <svg class="w-4 h-4 text-ok flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
  </svg>
  {% else %}
  <svg class="w-4 h-4 text-info flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
  </svg>
  {% endif %}
  <p class="text-xs {% if kind == 'error' %}text-danger{% elif kind == 'success' %}text-ok{% else %}text-info{% endif %}">{{ message }}</p>
</div>
