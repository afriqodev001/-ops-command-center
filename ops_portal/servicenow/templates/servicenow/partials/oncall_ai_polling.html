<div class="glass-card p-4 animate-fade-in"
     hx-get="/servicenow/oncall/poll-ai/{{ task_id }}/?change_number={{ change_number|urlencode }}&mode={{ mode }}"
     hx-trigger="load delay:3s"
     hx-target="#oncall-ai-batch-area"
     hx-swap="innerHTML">
  <div class="flex items-center gap-3">
    <div class="w-5 h-5 border-2 border-brand/30 border-t-brand rounded-full animate-spin flex-shrink-0"></div>
    <div class="flex-1 min-w-0">
      <p class="text-xs font-semibold text-info">
        {% if mode == 'batch' %}Running AI for {{ pending_count|default:'selected' }} change{{ pending_count|pluralize }}…
        {% else %}Running AI for {{ change_number }}…
        {% endif %}
      </p>
      <p class="text-[10px] text-ink-muted mt-0.5">Reviews are saved as each one finishes — refresh the page if needed.</p>
    </div>
  </div>
</div>
