<div class="glass-card p-4 animate-fade-in">
  <div class="flex items-start gap-2.5">
    <svg class="w-4 h-4 text-danger flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
    </svg>
    <div class="flex-1 min-w-0">
      <p class="text-xs font-semibold text-danger">Operation failed</p>
      <p class="text-xs text-ink-secondary mt-1 leading-relaxed">{{ error }}</p>
      {% if action_url and action_label %}
      <a href="{{ action_url }}" class="text-[11px] text-brand-light hover:text-brand mt-2 inline-block">{{ action_label }} →</a>
      {% endif %}
    </div>
  </div>
</div>
