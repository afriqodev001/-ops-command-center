{% if error %}
<div class="glass-card p-4 border border-warn/20">
  <p class="text-xs text-warn">{{ error }}</p>
  {% if action_url %}
  <a href="{{ action_url }}" class="text-[11px] text-brand-light hover:text-brand mt-1 inline-block">
    {{ action_label|default:"Fix this" }} →
  </a>
  {% endif %}
</div>
{% else %}
<div class="glass-card p-4">
  <div class="flex items-center gap-2 mb-2">
    <svg class="w-3.5 h-3.5 text-brand-light" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
    </svg>
    <h3 class="text-xs font-semibold text-ink-primary">AI summary</h3>
  </div>
  <p class="text-xs text-ink-secondary whitespace-pre-line leading-relaxed">{{ summary }}</p>
</div>
{% endif %}
