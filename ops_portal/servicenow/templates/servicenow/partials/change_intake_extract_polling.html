<div id="intake-wizard-inner" class="rounded-lg border border-edge bg-surface-3/40 p-3 animate-fade-in"
     hx-get="/servicenow/change-intake/{{ intake.pk }}/extract/poll/{{ task_id }}/"
     hx-trigger="load delay:3s"
     hx-target="#intake-wizard"
     hx-swap="innerHTML">
  <div class="flex items-center gap-3">
    <div class="w-4 h-4 border-2 border-brand/30 border-t-brand rounded-full animate-spin flex-shrink-0"></div>
    <div class="flex-1">
      <p class="text-xs font-semibold text-info">Extracting fields with AI…</p>
      <p class="text-[10px] text-ink-muted mt-0.5">Parsing dates, inferring category/reason, and seeding empty fields from the spreadsheet content. Existing edits are preserved.</p>
    </div>
  </div>
</div>
