<div class="glass-card p-4 flex flex-col gap-2">
  <h3 class="text-sm font-semibold text-ink-primary">{{ report.name }}</h3>
  {% if report.description %}
  <p class="text-[11px] text-ink-muted">{{ report.description }}</p>
  {% endif %}
  <div class="flex flex-wrap gap-1">
    {% for label in report.action_labels %}
    <span class="badge badge-muted text-[10px]">{{ label }}</span>
    {% endfor %}
  </div>
  <div class="flex items-center gap-2 mt-1 pt-2 border-t border-edge">
    <a href="/servicenow/reports/{{ report.slug }}/" class="btn-primary text-[11px] px-2.5 py-1">Open</a>
    <a href="/servicenow/reports/{{ report.slug }}/edit/" class="btn-ghost text-[11px] px-2 py-1">Edit</a>
  </div>
</div>
