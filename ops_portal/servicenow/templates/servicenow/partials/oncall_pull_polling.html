<div class="glass-card p-4 animate-fade-in"
     hx-get="/servicenow/oncall/pull/poll/{{ task_id }}/?preset={{ preset|urlencode }}&pull_purpose={{ pull_purpose|urlencode }}&change_numbers={{ change_numbers|urlencode }}"
     hx-trigger="load delay:2.5s"
     hx-target="#oncall-results"
     hx-swap="innerHTML">
  <div class="flex items-center gap-3">
    <div class="w-5 h-5 border-2 border-brand/30 border-t-brand rounded-full animate-spin flex-shrink-0"></div>
    <div class="flex-1 min-w-0">
      <p class="text-xs font-semibold text-info">
        Pulling changes for {% if pull_purpose == 'cr_approval' %}<span class="text-brand-light">CR approval</span>{% else %}<span class="text-warn">outage triage</span>{% endif %} · {{ window_label|default:'window' }}…
      </p>
      <p class="text-[10px] text-ink-muted font-mono">preset: {{ preset }}</p>
    </div>
  </div>
</div>
