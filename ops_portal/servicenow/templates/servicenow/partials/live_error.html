<div class="glass-card px-5 py-6 border border-danger/20 bg-danger/5">
  <div class="flex items-start gap-3">
    <svg class="w-5 h-5 text-danger flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
    </svg>
    <div class="flex-1 min-w-0">
      <p class="text-sm font-semibold text-danger">{{ title|default:"Live fetch failed" }}</p>
      {% if detail %}<p class="text-xs text-ink-muted mt-1 break-words">{{ detail }}</p>{% endif %}
      {% if hint %}<p class="text-[11px] text-ink-muted mt-2">{{ hint }}</p>{% endif %}
    </div>
  </div>
</div>
