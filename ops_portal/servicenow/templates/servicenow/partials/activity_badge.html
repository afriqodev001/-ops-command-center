{% if unread %}
<span id="activity-badge"
      class="absolute -top-0.5 -right-0.5 min-w-[16px] h-4 px-1 rounded-full bg-danger text-white text-[10px] font-bold leading-4 text-center tabular-nums">
  {% if unread > 9 %}9+{% else %}{{ unread }}{% endif %}
</span>
{% else %}
<span id="activity-badge" class="hidden"></span>
{% endif %}
