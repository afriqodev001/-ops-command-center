<form hx-post="/sploc/prompts/import/preview/"
      hx-target="#pack-import-area"
      hx-swap="innerHTML"
      hx-encoding="multipart/form-data"
      class="space-y-3">
  {% csrf_token %}
  <div>
    <label class="label">Pack file (JSON) <span class="text-danger">*</span></label>
    <input type="file" name="file" accept="application/json,.json" required
           class="block w-full text-xs text-ink-secondary file:mr-2 file:py-1.5 file:px-3 file:rounded file:border-0 file:bg-brand-subtle/30 file:text-brand-light hover:file:bg-brand-subtle/50">
    <p class="text-[10px] text-ink-muted mt-1">Expected format: <code>{"packs": {"name": {prompt, description, ...}}}</code></p>
  </div>
  <div class="flex items-center justify-end gap-2">
    <button type="button"
            onclick="document.getElementById('pack-import-modal').classList.add('hidden')"
            class="btn-ghost text-xs py-1.5 px-3">Cancel</button>
    <button type="submit" class="btn-primary text-xs py-1.5 px-3">Preview</button>
  </div>
</form>
