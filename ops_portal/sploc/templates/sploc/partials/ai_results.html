<div class="space-y-4 animate-fade-in" x-data="{ copyDone: false }">
  <div class="glass-card p-4">
    <div class="flex items-center justify-between mb-3">
      <div class="flex items-center gap-2">
        <svg class="w-4 h-4 text-ok flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        <span class="text-xs font-semibold text-ok">AI Response</span>
      </div>
      <button @click="navigator.clipboard.writeText(document.getElementById('ai-response-text').textContent).then(() => { copyDone = true; setTimeout(() => copyDone = false, 2000) })"
              class="btn-ghost text-[10px] py-0.5 px-1.5">
        <span x-text="copyDone ? 'Copied!' : 'Copy'"></span>
      </button>
    </div>

    <!-- Prompt -->
    {% if prompt %}
    <div class="rounded-lg bg-surface-3/60 border border-edge p-3 mb-3">
      <p class="text-[10px] font-semibold text-ink-muted uppercase tracking-wider mb-1">Prompt</p>
      <p class="text-xs text-ink-secondary">{{ prompt }}</p>
    </div>
    {% endif %}

    <!-- Response -->
    <div id="ai-response-text"
         class="prose prose-invert prose-xs max-w-none text-xs text-ink-secondary leading-relaxed p-3 rounded-lg bg-surface-2 border border-edge max-h-[60vh] overflow-y-auto whitespace-pre-wrap">{{ markdown }}</div>

    <!-- Metadata -->
    <div class="flex items-center gap-4 mt-3 text-[10px] text-ink-muted">
      {% if timestamp %}
      <span>{{ timestamp }}</span>
      {% endif %}
      {% if url %}
      <a href="{{ url }}" target="_blank" class="text-brand-light hover:text-brand truncate">{{ url|truncatechars:60 }}</a>
      {% endif %}
    </div>
  </div>
</div>
