{% if error %}
<div class="rounded-lg px-3 py-2 bg-danger/10 border border-danger/20">
  <p class="text-xs text-danger">{{ error }}</p>
</div>
<div class="flex justify-end mt-3">
  <button type="button"
          hx-get="/sploc/services/import/"
          hx-target="#service-import-area"
          hx-swap="innerHTML"
          class="btn-ghost text-xs py-1.5 px-3">Try again</button>
</div>
{% else %}
<form hx-post="/sploc/services/import/confirm/"
      hx-target="#services-list-area"
      hx-swap="innerHTML"
      hx-on::after-request="document.getElementById('service-import-modal').classList.add('hidden')"
      class="space-y-3">
  {% csrf_token %}
  <input type="hidden" name="services_json" value="{{ services_json }}">

  <div class="rounded-lg border border-edge max-h-72 overflow-y-auto">
    <table class="w-full text-xs">
      <thead class="bg-surface-3 sticky top-0">
        <tr>
          <th class="th text-left">Name</th>
          <th class="th text-left">Description</th>
          <th class="th text-left">Tags</th>
          <th class="th text-center w-16">Status</th>
        </tr>
      </thead>
      <tbody>
        {% for s in preview %}
        <tr class="table-row">
          <td class="td font-mono text-[10px]">{{ s.name }}</td>
          <td class="td text-[10px] text-ink-muted truncate max-w-xs">{{ s.description|default:"—"|truncatechars:60 }}</td>
          <td class="td text-[10px] text-ink-muted">{{ s.tags|default:"—"|truncatechars:40 }}</td>
          <td class="td text-center">
            {% if s.exists %}
            <span class="text-[9px] px-1.5 py-0.5 rounded bg-warn/10 text-warn">exists</span>
            {% else %}
            <span class="text-[9px] px-1.5 py-0.5 rounded bg-ok/10 text-ok">new</span>
            {% endif %}
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

  <div>
    <label class="label">On conflict</label>
    <div class="flex items-center gap-3 mt-1">
      <label class="flex items-center gap-1.5 cursor-pointer">
        <input type="radio" name="conflict_mode" value="skip" checked
               class="text-brand focus:ring-brand/50">
        <span class="text-[11px] text-ink-secondary">Skip existing</span>
      </label>
      <label class="flex items-center gap-1.5 cursor-pointer">
        <input type="radio" name="conflict_mode" value="overwrite"
               class="text-brand focus:ring-brand/50">
        <span class="text-[11px] text-ink-secondary">Overwrite existing</span>
      </label>
    </div>
  </div>

  <div class="flex items-center justify-end gap-2 pt-2 border-t border-edge">
    <button type="button"
            onclick="document.getElementById('service-import-modal').classList.add('hidden')"
            class="btn-ghost text-xs py-1.5 px-3">Cancel</button>
    <button type="submit" class="btn-primary text-xs py-1.5 px-3">Import</button>
  </div>
</form>
{% endif %}
