{% if ai_error %}
<div class="rounded-lg border border-danger/20 bg-danger/5 p-4 animate-fade-in">
  <div class="flex items-start gap-2.5">
    <svg class="w-4 h-4 text-danger flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
    </svg>
    <div>
      <p class="text-xs font-semibold text-danger">AI analysis failed</p>
      <p class="text-xs text-ink-secondary mt-1">{{ ai_error }}</p>
    </div>
  </div>
</div>

{% elif ai_response %}
<div class="rounded-lg border border-edge bg-surface-2 p-4 animate-fade-in" x-data="{ copyDone: false }">
  <div class="flex items-center justify-between mb-3">
    <div class="flex items-center gap-2">
      <div class="w-6 h-6 rounded-lg bg-ok/15 border border-ok/20 flex items-center justify-center">
        <svg class="w-3.5 h-3.5 text-ok" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <span class="text-xs font-semibold text-ink-primary">AI Analysis</span>
    </div>
    <button @click="navigator.clipboard.writeText(document.getElementById('splunk-ai-raw').textContent).then(() => { copyDone = true; setTimeout(() => copyDone = false, 2000) })"
            class="btn-ghost text-[10px] py-0.5 px-1.5">
      <span x-text="copyDone ? 'Copied!' : 'Copy'"></span>
    </button>
  </div>

  <script id="splunk-ai-raw" type="text/plain">{{ ai_response }}</script>
  <div id="splunk-ai-rendered" class="splunk-ai-md"></div>

  <script>
  (function(){
    var el = document.getElementById('splunk-ai-rendered');
    var raw = document.getElementById('splunk-ai-raw').textContent;
    function render() {
      try { el.innerHTML = marked.parse(raw); } catch(e) { el.textContent = raw; }
    }
    if (typeof marked !== 'undefined') render();
    else {
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/marked@15/marked.min.js';
      s.onload = render;
      document.head.appendChild(s);
    }
  })();
  </script>
</div>

<style>
  .splunk-ai-md { font-size: 0.8125rem; line-height: 1.75; color: #A1A1AA; word-break: break-word; }
  .splunk-ai-md h1, .splunk-ai-md h2 { font-size: 0.875rem; font-weight: 700; color: #FFFFFF; margin-top: 1.25rem; margin-bottom: 0.5rem; padding-bottom: 0.375rem; border-bottom: 1px solid hsla(0,0%,100%,0.06); }
  .splunk-ai-md h1:first-child, .splunk-ai-md h2:first-child { margin-top: 0; }
  .splunk-ai-md h3 { font-size: 0.8125rem; font-weight: 600; color: #FFFFFF; margin-top: 1rem; margin-bottom: 0.375rem; }
  .splunk-ai-md p { margin-bottom: 0.625rem; }
  .splunk-ai-md ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.625rem; }
  .splunk-ai-md ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 0.625rem; }
  .splunk-ai-md li { margin-bottom: 0.25rem; }
  .splunk-ai-md li::marker { color: #71717A; }
  .splunk-ai-md strong { color: #FFFFFF; font-weight: 600; }
  .splunk-ai-md code { font-size: 0.75rem; padding: 0.125rem 0.375rem; border-radius: 0.25rem; background: hsl(240,4%,18%); color: #A37EF5; }
  .splunk-ai-md pre { background: hsl(240,5%,12%); border: 1px solid hsla(0,0%,100%,0.06); border-radius: 0.5rem; padding: 0.75rem 1rem; margin-bottom: 0.75rem; overflow-x: auto; }
  .splunk-ai-md pre code { background: none; padding: 0; color: #A1A1AA; }
  .splunk-ai-md blockquote { border-left: 3px solid #8251EE; padding-left: 0.75rem; margin: 0.75rem 0; color: #71717A; }
  .splunk-ai-md table { width: 100%; border-collapse: collapse; margin-bottom: 0.75rem; font-size: 0.75rem; }
  .splunk-ai-md th, .splunk-ai-md td { padding: 0.5rem 0.75rem; border: 1px solid hsla(0,0%,100%,0.10); text-align: left; }
  .splunk-ai-md th { background: hsl(240,5%,14%); font-weight: 600; color: #FFFFFF; }
</style>
{% endif %}
