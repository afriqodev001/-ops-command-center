<form hx-post="/harness/workspace/projects/save/"
      hx-target="#ws-projects-area"
      hx-swap="innerHTML"
      class="space-y-3">
  {% csrf_token %}
  <div>
    <label class="label">Identifier <span class="text-danger">*</span></label>
    <input type="text" name="identifier" value="{{ identifier|default:'' }}"
           class="input-dark text-xs font-mono"
           {% if identifier %}readonly{% endif %}
           required>
    {% if identifier %}<p class="text-[10px] text-ink-muted mt-1">Identifier is the primary key — create a new entry to rename.</p>{% endif %}
  </div>
  <div>
    <label class="label">Display name</label>
    <input type="text" name="name" value="{{ project.name|default:'' }}" class="input-dark text-xs">
  </div>
  <div class="grid grid-cols-2 gap-3">
    <div>
      <label class="label">Org identifier</label>
      <input type="text" name="org" value="{{ project.org|default:'' }}" class="input-dark text-xs font-mono">
    </div>
    <div>
      <label class="label">Label / tag</label>
      <input type="text" name="label" value="{{ project.label|default:'' }}" class="input-dark text-xs"
             placeholder="e.g. team-infra">
    </div>
  </div>
  <label class="flex items-center gap-2 cursor-pointer pt-1">
    <input type="checkbox" name="default" value="true"
           {% if project.default %}checked{% endif %}
           class="rounded border-edge bg-surface-3">
    <span class="text-xs text-ink-secondary">Pin as default — surfaces in quick-pick chips</span>
  </label>
  <div class="flex items-center justify-end gap-2 pt-2 border-t border-edge">
    <button type="button"
            onclick="document.getElementById('ws-editor-modal').classList.add('hidden')"
            class="btn-ghost text-xs py-1.5 px-3">Cancel</button>
    <button type="submit" class="btn-primary text-xs py-1.5 px-3">Save</button>
  </div>
</form>
